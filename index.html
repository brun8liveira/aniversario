<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fotos Aleatórias</title>

  <style>
    body{
      margin:0;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    img{
      width:100%;
      height:100vh;
      object-fit:contain;
      cursor:pointer;
    }
  </style>
</head>
<body>

<img id="foto" src="./fotos/fotoaniversario.jpeg">

<script>

const foto = document.getElementById("foto");

foto.addEventListener("click", trocarFoto);

function trocarFoto(){

  const numero = Math.floor(Math.random() * 50) + 1;

  foto.src = `./fotos/foto${numero}.jpeg?t=${Date.now()}`;

}

</script>

</body>
</html>
