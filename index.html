<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fotos Aleatórias</title>

  <style>
    body{
      margin:0;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    img{
      width:100%;
      height:100vh;
      object-fit:contain;
      cursor:pointer;
    }

    /* FRASE DO RODAPÉ */
    #assinatura{
      position:fixed;
      bottom:25px;
      width:100%;
      text-align:center;
      color:white;
      font-size:28px;
      font-family:cursive;
      letter-spacing:2px;

      text-shadow:
        0 0 10px rgba(0,0,0,0.8),
        0 0 20px rgba(0,0,0,0.6);

      background:linear-gradient(
        to top,
        rgba(0,0,0,0.45),
        transparent
      );

      padding:20px 10px;

      pointer-events:none;
    }
  </style>
</head>

<body>

<img id="foto" src="./fotos/fotoaniversario.jpeg">

<div id="assinatura">
  Luís Miguel - 18/05
</div>

<script>

const foto = document.getElementById("foto");

let atual = 1;
const total = 50;

function trocarFoto(){
  atual++;

  if(atual > total){
    atual = 1; // volta pro início
  }

  foto.src = `./fotos/foto${atual}.jpeg?t=${Date.now()}`;
}

// troca ao clicar
foto.addEventListener("click", trocarFoto);

// troca automática a cada 3 segundos
setInterval(trocarFoto, 3000);

</script>
</body>
</html>
